[package]
name = "booomerang-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
dropshot = "0.12"
serde = { version = "1.0", features = ["derive"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1.0", features = ["full"] }
schemars = { version = "0.8", features = ["uuid1", "chrono"] }
slog = "2.7"
